{{define "page_register"}}
<article class="auth-card">
  <hgroup>
    <h2>{{index .I18n "auth.register_title"}}</h2>
    <p>{{index .I18n "app.tagline"}}</p>
  </hgroup>
  <form id="auth-form" data-action="register">
    <label for="email">{{index .I18n "auth.email"}}</label>
    <input type="email" id="email" name="email" autocomplete="email" required>

    <label for="password">{{index .I18n "auth.password"}}</label>
    <input type="password" id="password" name="password" autocomplete="new-password" minlength="6" required>

    <label for="confirm">{{index .I18n "auth.confirm_password"}}</label>
    <input type="password" id="confirm" name="confirm" autocomplete="new-password" minlength="6" required>

    <label for="code">{{index .I18n "auth.code"}}</label>
    <div class="grid">
      <input type="text" id="code" name="code" inputmode="numeric" maxlength="6" required>
      <button type="button" id="send-code-btn">{{index .I18n "auth.send_code"}}</button>
    </div>

    <button type="submit" id="auth-submit">{{index .I18n "auth.register"}}</button>
  </form>
  <ul class="auth-links">
    <li><a href="/login">{{index .I18n "auth.have_account"}}</a></li>
  </ul>
  <div id="auth-msg" class="auth-msg" role="alert" hidden></div>
</article>
{{end}}
